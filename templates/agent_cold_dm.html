{% extends "base.html" %}
{% block title %}{{ agent.agent_name }} — JobCraft AI{% endblock %}

{% block content %}
<h1>{{ agent.agent_name }}</h1>
<p class="subtitle">{{ agent.agent_description }}</p>

<form method="POST">
  <div class="form-grid">
    <div class="form-group">
      <label for="recipient_name">Recipient Name</label>
      <input type="text" id="recipient_name" name="recipient_name" required
        value="{{ inputs.get('recipient_name', '') }}">
    </div>
    <div class="form-group">
      <label for="recipient_role">Recipient Role / Title</label>
      <input type="text" id="recipient_role" name="recipient_role" required
        value="{{ inputs.get('recipient_role', '') }}">
    </div>
    <div class="form-group">
      <label for="company">Company</label>
      <input type="text" id="company" name="company" required
        value="{{ inputs.get('company', '') }}">
    </div>
    <div class="form-group">
      <label for="job_posting_link">Job Posting Link (optional)</label>
      <input type="url" id="job_posting_link" name="job_posting_link"
        value="{{ inputs.get('job_posting_link', '') }}">
    </div>
    <div class="form-group full-width">
      <label for="context">Context / Reason for Outreach</label>
      <textarea id="context" name="context" rows="4" required
        placeholder="e.g. Saw your post about hiring, interested in the backend role...">{{ inputs.get('context', '') }}</textarea>
    </div>
  </div>
  <div class="btn-group">
    <button type="submit" name="action" value="generate" class="btn">Generate DM</button>
  </div>
</form>
{% endblock %}
